name: Release Windows

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Create MSIX
        run: flutter pub run msix:create --install-certificate false

      - name: Rename MSIX to fixed name
        run: |
          $msix = Get-ChildItem "build\windows\x64\runner\Release\*.msix" | Select-Object -First 1
          if ($msix -and $msix.Name -ne "ATR-Setup.msix") {
            Rename-Item $msix.FullName "ATR-Setup.msix"
          }
        shell: pwsh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update version.json
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $obj = [ordered]@{
            version      = $version
            url          = "https://github.com/${{ github.repository }}/releases/download/v$version/ATR-Setup.msix"
            notes        = "Versão $version"
            published_at = (Get-Date -Format "yyyy-MM-dd")
          }
          $obj | ConvertTo-Json | Out-File -FilePath "releases/version.json" -Encoding utf8NoBOM
        shell: pwsh

      - name: Commit and push version.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git checkout main
          git add releases/version.json
          git diff --staged --quiet || git commit -m "chore: bump version.json to ${{ steps.version.outputs.VERSION }}"
          git push origin main
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/x64/runner/Release/ATR-Setup.msix
          name: ATR Locações v${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
