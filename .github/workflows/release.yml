name: Release Windows

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Decode signing certificate and export public .cer
        run: |
          $b64 = "${{ secrets.MSIX_CERT_PFX_BASE64 }}"
          $bytes = [System.Convert]::FromBase64String($b64)
          $pfxPath = "$env:GITHUB_WORKSPACE\atr-cert.pfx"
          $cerPath = "$env:GITHUB_WORKSPACE\atr-cert.cer"
          [System.IO.File]::WriteAllBytes($pfxPath, $bytes)
          $pwd = ConvertTo-SecureString -String "${{ secrets.MSIX_CERT_PASSWORD }}" -Force -AsPlainText
          $cert = Get-PfxCertificate -FilePath $pfxPath -Password $pwd
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Write-Host "PFX: $pfxPath"
          Write-Host "CER: $cerPath"
        shell: pwsh

      - name: Create signed MSIX
        run: flutter pub run msix:create --certificate-path="$env:GITHUB_WORKSPACE\atr-cert.pfx" --certificate-password="${{ secrets.MSIX_CERT_PASSWORD }}" --install-certificate false
        shell: pwsh

      - name: Rename MSIX to fixed name
        run: |
          $msix = Get-ChildItem "build\windows\x64\runner\Release\*.msix" | Select-Object -First 1
          if ($msix -and $msix.Name -ne "ATR-Setup.msix") {
            Rename-Item $msix.FullName "ATR-Setup.msix"
          }
        shell: pwsh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/Release/ATR-Setup.msix
            ${{ github.workspace }}/atr-cert.cer
          name: ATR Locações v${{ steps.version.outputs.VERSION }}
          body: |
            ## Versão ${{ steps.version.outputs.VERSION }}

            **Primeira instalação:** baixe `atr-cert.cer` e instale como "Trusted Root Certification Authority" (uma vez), depois baixe e instale `ATR-Setup.msix`.

            **Atualizações:** o app verifica novas versões automaticamente.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
