name: Release Windows

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Create MSIX
        run: flutter pub run msix:create --install-certificate false

      - name: Rename MSIX to fixed name
        run: |
          $msix = Get-ChildItem "build\windows\x64\runner\Release\*.msix" | Select-Object -First 1
          if ($msix -and $msix.Name -ne "ATR-Setup.msix") {
            Rename-Item $msix.FullName "ATR-Setup.msix"
          }
        shell: pwsh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/x64/runner/Release/ATR-Setup.msix
          name: ATR Locações v${{ steps.version.outputs.VERSION }}
          body: |
            Versão ${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
