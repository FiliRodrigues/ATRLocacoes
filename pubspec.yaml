name: fleet_app
description: "Plataforma de Gestão de Frotas (High-end B2B)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Gerenciamento de estado leve para mockups
  provider: ^6.1.2
  # Navegação
  go_router: ^13.2.0
  # Icones minimalistas e premium UI
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
